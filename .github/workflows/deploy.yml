on:
  push:
    branches:
      - main
      - feature
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  docker:
    name: Containerization
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.0.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build UI5 App
        run: npm run build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Verify dist folder
        run: |
          echo "📁 Contenu du dist :"
          ls -la dist/

      - name: DockerHub Login
        uses: docker/login-action@v2.2.0
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: kennetchofo/order_app:${{ github.sha }}
          build-args: |
              VITE_APP_GOOGLE_CLIENT_ID=${{ vars.VITE_APP_GOOGLE_CLIENT_ID }}
               
      - name: Docker Image Test
        run: |
          echo " Images construites :"
          docker images

          echo " Lancement du container pour test"
          docker run -d --name votingApp kennetchofo/order_app:${{ github.sha }}

          echo "Logs du container :"
          docker logs votingApp

          echo "Nettoyage du container"
          docker stop votingApp
          docker rm votingApp
