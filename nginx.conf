server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ✅ Proxy UI5 resources vers SAP CDN
    location /resources/ {
        proxy_pass https://ui5.sap.com/resources/;
        proxy_set_header Host ui5.sap.com;
        proxy_ssl_server_name on;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ✅ Proxy test-resources vers SAP CDN
    location /test-resources/ {
        proxy_pass https://ui5.sap.com/test-resources/;
        proxy_set_header Host ui5.sap.com;
        proxy_ssl_server_name on;
    }

    # Proxy vers SAP IAS
    location /oauth2/ {
        proxy_pass https://ankyikmcs.trial-accounts.ondemand.com/oauth2/;
        proxy_set_header Host ankyikmcs.trial-accounts.ondemand.com;
        proxy_ssl_server_name on;
    }

    # Proxy vers ABAP Backend
    location /sap/ {
        proxy_pass https://fa13318e-1cb9-41eb-b81d-1759ca1e28d3.abap.us10.hana.ondemand.com/sap/;
        proxy_set_header Host fa13318e-1cb9-41eb-b81d-1759ca1e28d3.abap.us10.hana.ondemand.com;
        proxy_ssl_server_name on;
    }

    # Gestion des routes UI5
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache ressources statiques
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}